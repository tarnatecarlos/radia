<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--surface); font-family:var(--font-sans); color:var(--fg-1); }
  .block { margin-bottom:18px; }
  .block:last-child { margin-bottom:0; }
  .lbl { font-size:11px; font-family:var(--font-mono); color:var(--fg-3); margin-bottom:6px; }
</style></head>
<body>
  <div class="block">
    <div class="lbl">Geist Sans — body & headings</div>
    <div style="font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1;">Aa Bb Cc Dd 0123456789</div>
    <div style="font-size:14px;color:var(--fg-2);margin-top:8px;">Light 300 · Regular 400 · Medium 500 · Semibold 600 · Bold 700</div>
  </div>
  <div class="block">
    <div class="lbl">Geist Mono — numerics, code, IDs (tabular)</div>
    <div style="font-family:var(--font-mono);font-size:24px;font-weight:500;">99.97%  ·  24ms  ·  120 req/min</div>
    <div style="font-family:var(--font-mono);font-size:13px;color:var(--fg-2);margin-top:8px;">slack #E01E5A · workspace_id: w1</div>
  </div>
  <div class="block">
    <div class="lbl">Eyebrow — 12px uppercase, +0.04em</div>
    <div style="font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3);">Menu · Messages</div>
  </div>
</body></html>
