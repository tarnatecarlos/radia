<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--surface); font-family:var(--font-sans); }
  .scale { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border); }
  .sw { flex:1; height:72px; display:flex; align-items:flex-end; padding:6px 8px; }
  .cap { display:flex; gap:0; margin-top:8px; }
  .cap span { flex:1; font-size:10px; font-family:var(--font-mono); color:var(--fg-3); text-align:center; }
  .name { font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--fg-3); margin-bottom:10px; }
  .hex { font-size:10px; font-family:var(--font-mono); color:rgba(255,255,255,.85); }
</style></head>
<body>
  <div class="name">Brand · Indigo</div>
  <div class="scale">
    <div class="sw" style="background:var(--radia-indigo-50)"></div>
    <div class="sw" style="background:var(--radia-indigo-100)"></div>
    <div class="sw" style="background:var(--radia-indigo-200)"></div>
    <div class="sw" style="background:var(--radia-indigo-300)"></div>
    <div class="sw" style="background:var(--radia-indigo-400)"></div>
    <div class="sw" style="background:var(--radia-indigo-500)"><span class="hex">500</span></div>
    <div class="sw" style="background:var(--radia-indigo-600)"><span class="hex">600</span></div>
    <div class="sw" style="background:var(--radia-indigo-700)"><span class="hex">700</span></div>
  </div>
  <div class="cap"><span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600·primary</span><span>700</span></div>
</body></html>
