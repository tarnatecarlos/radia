<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--surface); font-family:var(--font-sans); }
  .scale { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border); }
  .sw { flex:1; height:72px; }
  .cap { display:flex; margin-top:8px; }
  .cap span { flex:1; font-size:10px; font-family:var(--font-mono); color:var(--fg-3); text-align:center; }
  .name { font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--fg-3); margin-bottom:10px; }
</style></head>
<body>
  <div class="name">Neutral · Slate</div>
  <div class="scale">
    <div class="sw" style="background:var(--radia-slate-50)"></div>
    <div class="sw" style="background:var(--radia-slate-100)"></div>
    <div class="sw" style="background:var(--radia-slate-200)"></div>
    <div class="sw" style="background:var(--radia-slate-300)"></div>
    <div class="sw" style="background:var(--radia-slate-400)"></div>
    <div class="sw" style="background:var(--radia-slate-500)"></div>
    <div class="sw" style="background:var(--radia-slate-600)"></div>
    <div class="sw" style="background:var(--radia-slate-700)"></div>
    <div class="sw" style="background:var(--radia-slate-800)"></div>
    <div class="sw" style="background:var(--radia-slate-900)"></div>
  </div>
  <div class="cap"><span>50·bg</span><span>100</span><span>200·border</span><span>300</span><span>400·fg3</span><span>500</span><span>600·fg2</span><span>700</span><span>800</span><span>900·fg1</span></div>
</body></html>
