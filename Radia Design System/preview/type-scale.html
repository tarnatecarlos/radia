<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--surface); font-family:var(--font-sans); color:var(--fg-1); }
  .row { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid var(--border); }
  .row:last-child { border-bottom:0; }
  .spec { color:var(--fg-3); font-size:11px; font-family:var(--font-mono); white-space:nowrap; width:120px; flex-shrink:0; }
  .samp { line-height:1.1; }
</style></head>
<body>
  <div class="row"><span class="spec">2xl · 700</span><span class="samp" style="font-size:var(--text-2xl);font-weight:700;letter-spacing:-.02em;">Organization Chart</span></div>
  <div class="row"><span class="spec">xl · 600</span><span class="samp" style="font-size:var(--text-xl);font-weight:600;letter-spacing:-.02em;">Recent Activity</span></div>
  <div class="row"><span class="spec">lg · 600</span><span class="samp" style="font-size:var(--text-lg);font-weight:600;">Onboarding Overview</span></div>
  <div class="row"><span class="spec">base · 400</span><span class="samp" style="font-size:var(--text-base);">Manage members and SOPs</span></div>
  <div class="row"><span class="spec">sm · 400</span><span class="samp" style="font-size:var(--text-sm);color:var(--fg-2);">Default UI body text — 14px</span></div>
  <div class="row"><span class="spec">xs · 400</span><span class="samp" style="font-size:var(--text-xs);color:var(--fg-3);">Meta, captions, timestamps</span></div>
</body></html>
