<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--surface); font-family:var(--font-sans); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { background:var(--accent-soft); border:1.5px solid var(--accent); }
  .lbl { font-size:11px; font-family:var(--font-mono); color:var(--fg-3); margin-top:8px; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:var(--radius-xs)"></div><div class="lbl">xs · 4</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:var(--radius-sm)"></div><div class="lbl">sm · 6</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:var(--radius-md)"></div><div class="lbl">md · 8</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:var(--radius-lg)"></div><div class="lbl">lg · 10 ★</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:var(--radius-xl)"></div><div class="lbl">xl · 14</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:var(--radius-2xl)"></div><div class="lbl">2xl · 20</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:var(--radius-full)"></div><div class="lbl">full</div></div>
  </div>
</body></html>
